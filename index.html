<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBTI · 食物性格测试 — 你是什么类型的吃货？</title>
<meta name="description" content="通过食物偏好测出你的吃货人格！从香菜到蚕蛹，从北京烤鸭到贵州牛瘪，看看你在美食世界里是什么段位。">
<meta property="og:title" content="FBTI 食物性格测试">
<meta property="og:description" content="通过食物喜好测出你的吃货人格类型！简单10题/中等25题/深度50题">
<meta property="og:image" content="https://food.nobodyls.cn/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d1a;
  --surface: #161627;
  --card: #1e1e35;
  --border: #2a2a4a;
  --accent: #ff4d6d;
  --accent2: #ff8c42;
  --gold: #ffd700;
  --purple: #a855f7;
  --text: #f0f0f5;
  --muted: #8888aa;
  --radius: 18px;
  --font-display: 'ZCOOL QingKe HuangYou', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-body: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
.container { max-width: 660px; margin: 0 auto; padding: 16px; }

/* ── Screens ── */
.screen { display: none; animation: fadeIn .4s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }

/* ── Home ── */
.hero {
  text-align: center;
  padding: 60px 20px 32px;
}
.hero-emoji { font-size: 4em; margin-bottom: 12px; display: block; }
.hero h1 {
  font-family: var(--font-display);
  font-size: 2.8em;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  letter-spacing: 2px;
}
.hero p { color: var(--muted); font-size: 1em; line-height: 1.7; margin-bottom: 32px; }

.mode-grid { display: flex; flex-direction: column; gap: 14px; }
.mode-btn {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 20px 24px;
  cursor: pointer; transition: all .2s; text-align: left;
}
.mode-btn:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,77,109,.15); }
.mode-btn .mode-left { display: flex; align-items: center; gap: 14px; }
.mode-icon { font-size: 2em; }
.mode-title { font-family: var(--font-display); font-size: 1.3em; color: var(--text); }
.mode-sub { font-size: .85em; color: var(--muted); margin-top: 2px; }
.mode-badge {
  font-size: .75em; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  background: rgba(255,77,109,.15); color: var(--accent);
}
.mode-btn.medium .mode-badge { background: rgba(255,140,66,.15); color: var(--accent2); }
.mode-btn.hard .mode-badge { background: rgba(168,85,247,.15); color: var(--purple); }

.tier-preview { margin-top: 40px; }
.tier-preview h3 { font-family: var(--font-display); font-size: 1.1em; color: var(--muted); margin-bottom: 12px; }
.tier-list { display: flex; flex-wrap: wrap; gap: 8px; }
.tier-chip {
  padding: 6px 14px; border-radius: 20px; font-size: .85em; font-weight: 500;
  border: 1px solid; cursor: default;
}

/* ── Quiz ── */
.quiz-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0; margin-bottom: 12px;
}
.quiz-back { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .9em; }
.quiz-back:hover { color: var(--text); }
.progress-bar { flex: 1; height: 4px; background: var(--border); border-radius: 4px; margin: 0 16px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 4px; transition: width .3s; }
.quiz-count { font-size: .85em; color: var(--muted); white-space: nowrap; }

.food-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px 24px;
  text-align: center; margin-bottom: 16px;
}
.food-emoji { font-size: 3.5em; margin-bottom: 8px; display: block; }
.food-name { font-family: var(--font-display); font-size: 1.8em; margin-bottom: 4px; }
.food-region { font-size: .82em; color: var(--accent); margin-bottom: 10px; }
.food-desc { font-size: .92em; color: var(--muted); line-height: 1.6; }

.tier-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.tier-btn {
  padding: 14px 10px; border-radius: 14px; border: 2px solid var(--border);
  background: var(--surface); cursor: pointer; transition: all .15s;
  text-align: center; position: relative; overflow: hidden;
}
.tier-btn:hover { transform: scale(1.03); }
.tier-btn.selected { border-color: currentColor; background: rgba(255,255,255,.06); }
.tier-btn.selected::before { content: '✓'; position: absolute; top: 6px; right: 8px; font-size: .75em; }
.tier-label { font-family: var(--font-display); font-size: 1em; margin-bottom: 2px; }
.tier-desc { font-size: .72em; color: var(--muted); line-height: 1.3; }

/* Tier colors */
.t-sss { color: #ff4d6d; }
.t-ss  { color: #ff8c42; }
.t-s   { color: #ffd700; }
.t-a   { color: #a3e635; }
.t-b   { color: #60a5fa; }
.t-c   { color: #c084fc; }
.t-d   { color: #888; }
.t-unk { color: #555; }

.quiz-nav { display: flex; gap: 12px; }
.btn { padding: 14px 28px; border-radius: 12px; border: none; cursor: pointer; font-family: var(--font-body); font-size: 1em; font-weight: 700; transition: all .2s; }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; flex: 1; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,77,109,.3); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }

/* ── Result ── */
.result-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px 24px;
  text-align: center; margin-bottom: 20px;
}
.result-code {
  font-family: monospace; font-size: 1em; color: var(--muted);
  letter-spacing: 4px; margin-bottom: 12px;
}
.result-emoji { font-size: 3em; margin-bottom: 8px; display: block; }
.result-title {
  font-family: var(--font-display); font-size: 2em;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 16px;
}
.result-desc { font-size: .95em; color: var(--muted); line-height: 1.8; text-align: left; }
.result-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; justify-content: center; }
.tag {
  padding: 5px 14px; border-radius: 20px; font-size: .8em;
  background: rgba(255,77,109,.1); border: 1px solid rgba(255,77,109,.25); color: var(--accent);
}

.dim-panel { margin-bottom: 20px; }
.dim-panel h3 { font-family: var(--font-display); font-size: 1.1em; margin-bottom: 12px; color: var(--muted); }
.dim-row { margin-bottom: 10px; }
.dim-labels { display: flex; justify-content: space-between; font-size: .82em; margin-bottom: 4px; }
.dim-left { color: var(--accent); font-weight: 700; }
.dim-right { color: var(--muted); }
.dim-bar { height: 8px; background: var(--border); border-radius: 8px; overflow: hidden; }
.dim-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--accent), var(--gold)); transition: width .8s cubic-bezier(.4,0,.2,1); }

.share-area { display: flex; gap: 12px; margin-bottom: 40px; }
.btn-share { background: var(--card); border: 1px solid var(--border); color: var(--text); flex: 1; }
.btn-share:hover { border-color: var(--purple); color: var(--purple); }
.btn-restart { background: rgba(255,77,109,.1); border: 1px solid rgba(255,77,109,.3); color: var(--accent); }

/* Share card (hidden canvas) */
#share-canvas { display: none; }

/* ── Misc ── */
.skip-hint { text-align: center; margin-top: 8px; }
.skip-hint button { background: none; border: none; color: var(--muted); font-size: .8em; cursor: pointer; text-decoration: underline; }
.skip-hint button:hover { color: var(--text); }

footer { text-align: center; padding: 20px; color: var(--muted); font-size: .78em; }
footer a { color: var(--muted); }

/* ── Responsive ── */
@media (max-width: 480px) {
  .hero h1 { font-size: 2.2em; }
  .tier-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .tier-btn { padding: 12px 6px; }
}
</style>
</head>
<body>

<!-- ── HOME ── -->
<div id="screen-home" class="screen active">
  <div class="container">

  </div>
  <footer><a href="https://nobodyls.cn">nobodyls.cn</a> · FBTI Food-Based Type Indicator</footer>

    <div class="skip-hint"><button onclick="skipQuestion()">跳过这道题</button></div>

</div>

  <footer><a href="https://nobodyls.cn">nobodyls.cn</a> · FBTI Food-Based Type Indicator</footer>
</div>

let mode = 'easy';

// ══════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  answers = {};
  current = 0;
  showScreen('home');
}

function startQuiz(m) {
  mode = m;
  const count = MODE_COUNTS[m];
  questions = QUESTIONS.slice(0, count);
  answers = {};
  current = 0;
  showScreen('quiz');
  renderQuestion();
}

// ══════════════════════════════════════
//  QUIZ LOGIC
// ══════════════════════════════════════
function renderQuestion() {
  const q = questions[current];
  const total = questions.length;

  document.getElementById('food-emoji').textContent = q.image;
  document.getElementById('food-name').textContent = q.name;
  document.getElementById('food-region').textContent = '📍 ' + q.region;
  document.getElementById('food-desc').textContent = q.desc;
  document.getElementById('quiz-count').textContent = (current + 1) + ' / ' + total;
  document.getElementById('progress-fill').style.width = (current / total * 100) + '%';

  // Reset tier buttons
  [0,1,2,3,4,5,6,7].forEach(v => {
    const btn = document.getElementById('t' + v);
    if (btn) btn.classList.remove('selected');
  });

  // Restore selection
  const saved = answers[q.id];
  if (saved !== undefined) {
    const btn = document.getElementById('t' + saved);
    if (btn) btn.classList.add('selected');
    document.getElementById('btn-next').disabled = false;
  } else {
    document.getElementById('btn-next').disabled = true;
  }

  document.getElementById('btn-prev').disabled = current === 0;
}

function selectTier(score) {
  const q = questions[current];
  answers[q.id] = score;

  [0,1,2,3,4,5,6,7].forEach(v => {
    const btn = document.getElementById('t' + v);
    if (btn) btn.classList.remove('selected');
  });
  document.getElementById('t' + score).classList.add('selected');
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    renderQuestion();
  }
}

function skipQuestion() {
  const q = questions[current];
  answers[q.id] = 0; // treat as 没吃过
  nextQuestion();
}

// ══════════════════════════════════════
//  SCORING
// ══════════════════════════════════════
function calcScores() {
  const raw = {};
  'EHLWBGNFRC'.split('').forEach(d => raw[d] = 0);
  const count = {};
  'EHLWBGNFRC'.split('').forEach(d => count[d] = 0);

  const opposite = { E:'C', C:'E', H:'L', L:'H', W:'N', N:'W', B:'G', G:'B', F:'R', R:'F' };

  for (const [qIdStr, score] of Object.entries(answers)) {
    if (score === 0) continue; // 没吃过跳过
    const qId = parseInt(qIdStr);
    const q = questions.find(x => x.id === qId);
    if (!q) continue;

    for (const [dim, weight] of Object.entries(q.dims)) {
      if (score >= 5) {
        raw[dim] = (raw[dim] || 0) + score * weight;
        count[dim] = (count[dim] || 0) + 1;
      } else if (score <= 3) {
        const opp = opposite[dim];
        raw[opp] = (raw[opp] || 0) + (8 - score) * weight;
        count[opp] = (count[opp] || 0) + 1;
      }
      // score == 4 (NPC): 不计入
    }
  }

  const pairs = [['E','C'],['H','L'],['W','N'],['B','G'],['F','R']];
  const result = {};
  for (const [pos, neg] of pairs) {
    const total = (raw[pos] || 0) + (raw[neg] || 0);
    result[pos] = total ? Math.round((raw[pos] || 0) / total * 100) : 50;
    result[neg] = 100 - result[pos];
  }
  return result;
}

function getTypeCode(scores) {
  const pairs = [['E','C'],['H','L'],['W','N'],['B','G'],['F','R']];
  return pairs.map(([p,n]) => scores[p] >= 50 ? p : n).join('');
}

  { pos:'E', neg:'C', label:'探索度', posLabel:'Explorer 勇于尝新', negLabel:'Conservative 固守熟悉' },
  { pos:'H', neg:'L', label:'口味谱', posLabel:'Heavy 重口嗜辣', negLabel:'Light 清淡本味' },
  { pos:'W', neg:'N', label:'地域宽度', posLabel:'Wide 五湖四海', negLabel:'Narrow 一方水土' },
  { pos:'B', neg:'G', label:'食材胆量', posLabel:'Bold 大胆猎奇', negLabel:'Gentle 安全保守' },
  { pos:'F', neg:'R', label:'投入度', posLabel:'Fanatic 排队狂魔', negLabel:'Relaxed 随缘就好' },
];

function showResult() {
  const scores = calcScores();
  const code = getTypeCode(scores);
  const type = TYPES[code] || TYPES['ELWGR']; // fallback

  document.getElementById('result-code').textContent = code;
  document.getElementById('result-emoji').textContent = type.emoji;
  document.getElementById('result-title').textContent = type.title;
  document.getElementById('result-desc').textContent = type.desc;

  const tagsEl = document.getElementById('result-tags');
  tagsEl.innerHTML = type.tags.map(t => `<span class="tag">${t}</span>`).join('');

  // Dimension bars
  const barsEl = document.getElementById('dim-bars');
  barsEl.innerHTML = DIM_PAIRS.map(p => {
    const pct = scores[p.pos];
    const dominant = pct >= 50 ? p.posLabel : p.negLabel;
    const dominantPct = pct >= 50 ? pct : 100 - pct;
    return `
      <div class="dim-row">
        <div class="dim-labels">
          <span class="dim-left">${p.posLabel}</span>
          <span class="dim-right">${p.negLabel}</span>
        </div>
        <div class="dim-bar">
          <div class="dim-fill" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join('');

  showScreen('result');
  // Animate bars after render
  setTimeout(() => {
    document.querySelectorAll('.dim-fill').forEach(el => {
      el.style.transition = 'width .8s cubic-bezier(.4,0,.2,1)';
    });
  }, 50);
}

// ══════════════════════════════════════
//  SHARE CARD (Canvas)
// ══════════════════════════════════════
function shareCard() {
  const scores = calcScores();
  const code = getTypeCode(scores);
  const type = TYPES[code] || TYPES['ELWGR'];

  const canvas = document.getElementById('share-canvas');
  const W = 900, H = 500;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, '#0d0d1a');
  grad.addColorStop(1, '#1a0a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Decorative circles
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#ff4d6d';
  ctx.beginPath(); ctx.arc(W-80, 80, 200, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(80, H-80, 160, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Border
  ctx.strokeStyle = 'rgba(255,77,109,0.3)';
  ctx.lineWidth = 2;
  roundRect(ctx, 12, 12, W-24, H-24, 24);
  ctx.stroke();

  // Emoji
  ctx.font = '80px serif';
  ctx.textAlign = 'center';
  ctx.fillText(type.emoji, W/2, 130);

  // Type code
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = 'rgba(255,77,109,0.7)';
  ctx.letterSpacing = '6px';
  ctx.fillText(code, W/2, 175);

  // Title - fallback font for Chinese
  ctx.font = 'bold 48px "Microsoft YaHei", "PingFang SC", sans-serif';
  const titleGrad = ctx.createLinearGradient(W/2-200, 0, W/2+200, 0);
  titleGrad.addColorStop(0, '#ff4d6d');
  titleGrad.addColorStop(1, '#ffd700');
  ctx.fillStyle = titleGrad;
  ctx.fillText(type.title, W/2, 240);

  // Tags
  ctx.font = '18px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  const tagsStr = type.tags.join('  ·  ');
  ctx.fillText(tagsStr, W/2, 300);

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(100, 330); ctx.lineTo(W-100, 330); ctx.stroke();

  // Dim bars (5 bars)
  const barY = 360;
  const barW = (W - 200) / 5 - 10;
  DIM_PAIRS.forEach((p, i) => {
    const x = 100 + i * (barW + 10);
    const pct = scores[p.pos] / 100;
    const label = code[i];

    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    roundRect(ctx, x, barY, barW, 60, 8);
    ctx.fill();

    const fillGrad = ctx.createLinearGradient(x, 0, x+barW, 0);
    fillGrad.addColorStop(0, '#ff4d6d');
    fillGrad.addColorStop(1, '#ffd700');
    ctx.fillStyle = fillGrad;
    roundRect(ctx, x, barY, barW * pct, 60, 8);
    ctx.fill();

    ctx.fillStyle = 'white';
    ctx.font = 'bold 20px monospace';
    ctx.fillText(label, x + barW/2, barY + 38);
  });

  // Footer
  ctx.font = '15px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('food.nobodyls.cn  ·  FBTI 食物性格测试', W/2, H - 24);

  // Download
  const link = document.createElement('a');
  link.download = 'FBTI-' + code + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}
